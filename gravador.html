<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravador de Calls · ERA</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style id="css">
  :root{--bg:#faf9f5;--card:#fff;--txt:#1F2041;--ink:#3A3A57;--muted:#6B6B80;--line:#E6E5EE;
    --accent:#4B3F72;--green:#417B5A;--red:#C0392B;--shadow:0 10px 30px rgba(31,32,65,.12);}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:radial-gradient(900px 500px at 80% -10%,#F4E6DA,var(--bg) 60%);min-height:100vh}
  h1,h2{font-family:'Quicksand',sans-serif;margin:0;color:var(--txt)}
  .wrap{max-width:520px;margin:0 auto;padding:30px 20px}
  .rec{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow)}
  .logo{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,#4B3F72,#417B5A);display:grid;place-items:center;font-size:22px;color:#fff;margin-bottom:10px}
  label{font-size:13px;color:var(--muted);display:block;margin:12px 0 6px}
  input{width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--txt);font-size:15px;font-family:'Inter'}
  input:focus{outline:none;border-color:var(--accent)}
  .btn{border:none;border-radius:11px;padding:11px 16px;font-weight:600;cursor:pointer;font-size:14px;font-family:'Inter';display:inline-flex;align-items:center;gap:8px;transition:transform .12s,opacity .2s}
  .btn:hover{transform:translateY(-2px)} .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .btn-rec{background:var(--red);color:#fff;width:100%;justify-content:center;font-size:16px;padding:14px}
  .btn-stop{background:var(--txt);color:#fff;width:100%;justify-content:center;font-size:16px;padding:14px}
  .btn-soft{background:#EDEDF4;color:var(--txt)}
  .row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .timer{font-family:'Quicksand';font-size:40px;font-weight:700;color:var(--txt);text-align:center;margin:10px 0 4px}
  .dot{display:inline-block;width:11px;height:11px;border-radius:50%;background:var(--red);margin-right:7px;animation:pulse 1s infinite}
  .status{font-size:13px;color:var(--muted);text-align:center;min-height:18px}
  .ok{color:var(--green)} .erro{color:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .pip-mode .wrap{padding:10px} .pip-mode .logo,.pip-mode .desc,.pip-mode h1{display:none}
</style>
</head>
<body>
<div class="wrap" id="host">
  <div class="rec" id="rec">
    <div class="logo">🎙️</div>
    <h1 style="font-size:24px">Gravador de Calls</h1>
    <p class="desc" style="color:var(--muted);font-size:13px;margin:4px 0 6px">Grava você + cliente e envia direto para análise.</p>

    <label>Cliente</label>
    <input id="cliente" placeholder="Nome do cliente">

    <div class="timer" id="timer">00:00</div>
    <div class="status" id="status">Carregando…</div>

    <div style="margin-top:12px">
      <button class="btn btn-rec" id="btnRec" onclick="toggle()" disabled>🔴 Gravar</button>
    </div>
    <div class="row">
      <button class="btn btn-soft" id="btnPip" onclick="flutuar()" style="flex:1">📌 Flutuar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
<script>
const SUPABASE_URL = "https://lhncmqqnyxqkxfhiafaz.supabase.co";
const SUPABASE_KEY = "sb_publishable_9zXFMPKbxrrDM8t5ecjY5Q_p4wCipFB";
const FUNC = "quick-responder";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let USER=null, mediaRec=null, chunks=[], t0=0, tick=null, gravando=false, pipWin=null;

function $(id){ return (pipWin?pipWin.document:document).getElementById(id); }
function setStatus(t,cls){ const s=$('status'); if(s){ s.innerHTML=t; s.className='status '+(cls||''); } }

async function init(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ USER=session.user; $('btnRec').disabled=false; setStatus('Pronto para gravar.'); }
  else { setStatus('Entre no painel primeiro (aba principal) e reabra o gravador.', 'erro'); }
}

async function toggle(){ gravando?parar():iniciar(); }

async function iniciar(){
  if(!USER){ setStatus('Faça login no painel primeiro.','erro'); return; }
  try{
    setStatus('Selecione a tela/janela da call e marque "compartilhar áudio".');
    const disp=await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});
    if(!disp.getAudioTracks().length){ setStatus('Não veio áudio do sistema. No navegador, marque "compartilhar áudio".','erro'); disp.getTracks().forEach(t=>t.stop()); return; }
    const mic=await navigator.mediaDevices.getUserMedia({audio:true});
    const ac=new AudioContext(); const dest=ac.createMediaStreamDestination();
    ac.createMediaStreamSource(new MediaStream(disp.getAudioTracks())).connect(dest);
    ac.createMediaStreamSource(mic).connect(dest);
    chunks=[]; mediaRec=new MediaRecorder(dest.stream,{mimeType:'audio/webm'});
    mediaRec.ondataavailable=e=>{ if(e.data.size)chunks.push(e.data); };
    mediaRec.onstop=async()=>{ disp.getTracks().forEach(t=>t.stop()); mic.getTracks().forEach(t=>t.stop()); try{ac.close()}catch(_){} await enviar(); };
    const vt=disp.getVideoTracks()[0]; if(vt) vt.addEventListener('ended',()=>{ if(gravando) parar(); });
    mediaRec.start();
    gravando=true; t0=Date.now(); tick=setInterval(timerTick,500);
    $('btnRec').textContent='⏹ Parar'; $('btnRec').className='btn btn-stop';
    setStatus('<span class="dot"></span> Gravando…');
  }catch(e){ setStatus('Não consegui iniciar: '+(e.message||e),'erro'); }
}
function parar(){ if(!mediaRec) return; gravando=false; clearInterval(tick);
  $('btnRec').textContent='🔴 Gravar'; $('btnRec').className='btn btn-rec'; mediaRec.stop(); }
function timerTick(){ const s=Math.floor((Date.now()-t0)/1000);
  const el=$('timer'); if(el) el.textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

async function toMp3(blob){
  const buf=await blob.arrayBuffer();
  const ac=new (window.AudioContext||window.webkitAudioContext)();
  const decoded=await ac.decodeAudioData(buf);
  const rate=16000;
  const off=new OfflineAudioContext(1,Math.ceil(decoded.duration*rate),rate);
  const src=off.createBufferSource(); src.buffer=decoded; src.connect(off.destination); src.start();
  const rendered=await off.startRendering();
  const ch=rendered.getChannelData(0); const int16=new Int16Array(ch.length);
  for(let i=0;i<ch.length;i++){const v=Math.max(-1,Math.min(1,ch[i]));int16[i]=v<0?v*32768:v*32767;}
  const enc=new lamejs.Mp3Encoder(1,rate,64); const out=[]; const bs=1152;
  for(let i=0;i<int16.length;i+=bs){const m=enc.encodeBuffer(int16.subarray(i,i+bs));if(m.length)out.push(m);}
  const e=enc.flush(); if(e.length)out.push(e);
  return new Blob(out,{type:'audio/mpeg'});
}

async function enviar(){
  try{
    setStatus('Preparando áudio…');
    const webm=new Blob(chunks,{type:'audio/webm'});
    const mp3=await toMp3(webm);
    if(mp3.size>25*1024*1024){ setStatus('Áudio muito grande (>25MB). Tente uma call mais curta.','erro'); return; }
    setStatus('Enviando para a nuvem…');
    const cli=($('cliente').value||'call').replace(/[^\w.\-]+/g,'_');
    const path=`${USER.id}/${Date.now()}_${cli}.mp3`;
    const up=await sb.storage.from('audios').upload(path,mp3,{contentType:'audio/mpeg'});
    if(up.error) throw up.error;
    setStatus('Transcrevendo e analisando…');
    const {data,error}=await sb.functions.invoke(FUNC,{body:{audio_path:path,cliente:($('cliente').value||null)}});
    if(error){ let m=error.message; try{const c=await error.context.json();m=c.error||m}catch(_){ } throw new Error(m); }
    if(data&&data.error) throw new Error(data.error);
    setStatus('Analisado! ✓ Veja no painel.','ok');
    const el=$('timer'); if(el) el.textContent='00:00';
    const c=$('cliente'); if(c) c.value='';
  }catch(e){ setStatus('Erro: '+(e.message||e),'erro'); }
}

async function flutuar(){
  if(!('documentPictureInPicture' in window)){ setStatus('Janela flutuante só no Chrome/Edge (ou no app).','erro'); return; }
  if(pipWin){ pipWin.close(); return; }
  pipWin=await documentPictureInPicture.requestWindow({width:300,height:230});
  pipWin.document.head.appendChild(document.getElementById('css').cloneNode(true));
  pipWin.document.body.classList.add('pip-mode');
  pipWin.document.body.appendChild(document.getElementById('rec'));
  pipWin.addEventListener('pagehide',()=>{ document.getElementById('host').appendChild(document.getElementById('rec')); pipWin=null; });
}

init();
</script>
</body>
</html>
